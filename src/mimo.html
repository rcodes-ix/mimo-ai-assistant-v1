<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIMO</title>
    <link rel="stylesheet" href="mimo.css">
</head>
<body>
        
            <div id="main2">
                <div id="header">
                <h1>Chat with <span>Mimo</span></h1>
                </div>

                <div id="cont">
                    <div id="body">
                        <div id="empty-state">
                            <h2>What’s your next content idea?</h2>
                            <p>Ask for hooks, video ideas, or ways to grow your audience.</p>
                        </div>
                    </div>

                    <div id="message-box">
                        <div id="typing-box">
                            <div id="plus">
                                <svg class="icon" id="p-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#fff" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
                                </svg>

                            </div>
                            <input type="text" placeholder="Ask anything">
                            <div id="voice">
                                <svg class="icon" id="v-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#fff" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                                </svg>

                            </div>
                            <div id="send-btn">
                                <svg class="icon" id="s-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="#fff" class="size-6">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5 12 3m0 0 7.5 7.5M12 3v18" />
                                </svg>

                                <svg class="icon" id="stop-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="#fff">
                                    <rect x="6" y="6" width="12" height="12" rx="2.5" />
                                </svg>
                            </div>
                        </div>
                    </div>
                </div>
                
            </div>
           
            
            <script src="mimo.js">
            </script>
        
</body>
</html>
